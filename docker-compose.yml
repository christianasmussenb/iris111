services:
  iris111:
    image: ${IRIS_IMAGE:-intersystemsdc/iris-community:2024.1-final}
    container_name: ${IRIS_CONTAINER_NAME:-iris111}
    ports:
      - "${IRIS_PORT:-52773}:52773"
    environment:
      IRIS_PASSWORD: ${IRIS_PASSWORD:-Demo123456!}
    volumes:
      - ${WORKSPACE_DIR:-.}/src:/iris/code
      - ${WORKSPACE_DIR:-.}/data:/iris/data
      - ${WORKSPACE_DIR:-.}/tests:/iris/tests
      - ${WORKSPACE_DIR:-.}/frontend:/iris/frontend
    restart: unless-stopped
